name = "chud-skins"
main = "src/index.js"
compatibility_date = "2025-01-01"

# Scheduled refresh.
[triggers]
crons = ["*/15 * * * *"]

# KV.
[[kv_namespaces]]
binding = "CATALOG"
id = "3e828b8e9e924b4ca4be4422aba45862"

# Image store.
[[r2_buckets]]
binding = "IMAGES"
bucket_name = "chud-skins-images"

# File store.
[[r2_buckets]]
binding = "FILES"
bucket_name = "chud-skins-files"

# CRAWL_KEY: wrangler secret.
