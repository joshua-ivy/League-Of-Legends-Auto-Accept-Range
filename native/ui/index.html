<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chud — League Tools</title>
  <link rel="icon" type="image/png" href="icons/app.png" />
  <link rel="stylesheet" href="styles/neon.css" />
  <link rel="stylesheet" href="styles/library.css" />
  <link rel="stylesheet" href="styles/profile.css" />
  <link rel="stylesheet" href="styles/modscan.css" />
</head>
<body>
  <div class="app-bg"></div>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <img class="brand-mark" src="icons/app.png" alt="Chud" />
        <div class="col" style="gap:1px">
          <span class="brand-title">Chud</span>
          <span class="brand-sub">LEAGUE TOOLS</span>
        </div>
      </div>
      <nav class="nav" id="nav"></nav>
      <div class="spacer"></div>
      <button id="updatePill" class="update-pill" style="display:none"></button>
      <button class="btn ghost sm" id="exitBtn" title="Exit"><span id="exitIco" style="display:inline-flex;width:15px;height:15px"></span></button>
    </header>
    <div class="content"><div class="content-inner fade-in" id="page"></div></div>
  </div>

  <div class="update-overlay" id="updateOverlay" style="display:none">
    <div class="update-card">
      <img class="update-mark" src="icons/app.png" alt="Chud" />
      <div class="update-title" id="updateTitle">Update available</div>
      <div class="update-sub" id="updateSub"></div>
      <div class="update-track"><div class="update-bar" id="updateBar"></div></div>
      <div class="update-pct" id="updatePct"></div>
      <div class="update-actions" id="updateActions">
        <button class="btn ghost sm" id="updateLater">Later</button>
        <button class="btn primary sm" id="updateNow">Update &amp; restart</button>
      </div>
    </div>
  </div>

  <div class="adv-overlay" id="advisory" hidden>
    <div class="adv-card">
      <div class="adv-head">
        <svg class="adv-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3 2 20h20z"></path><path d="M12 10v5"></path><circle cx="12" cy="17.5" r="0.6" fill="currentColor" stroke="none"></circle></svg>
        <div class="adv-title" id="advisory-title">Riot update is blocking skin apps</div>
      </div>
      <div class="adv-msg" id="advisory-msg"></div>
      <div class="adv-detail" id="advisory-detail"></div>
      <button class="adv-btn" id="advisory-dismiss">Got it</button>
    </div>
  </div>

  <div class="toast-wrap" id="toasts"></div>

  <script src="src/shared.js"></script>
  <script src="src/profile.js"></script>
  <script src="src/library.js"></script>
  <script src="src/studio.js"></script>
  <script src="src/modscan.js"></script>
  <script src="src/main.js"></script>
</body>
</html>
